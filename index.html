<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logan's Laboratory</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .logo-stage {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px;
      pointer-events: none;
    }

    .logo-wrap {
      width: 140px;
      height: 140px;
      transform-style: preserve-3d;
    }

    .logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      animation: turntableSpin 14s linear infinite;
      transform-style: preserve-3d;
      backface-visibility: visible;
    }

    @keyframes turntableSpin {
      0% {
        transform: rotateY(0deg);
      }

      100% {
        transform: rotateY(360deg);
      }
    }

    footer {
      position: fixed;
      left: 0;
      bottom: 0;
      width: 100%;
      padding: 28px 24px;
      text-align: center;
      background: #ffffff;
    }

    .footer-text {
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #777777;
      font-weight: 500;
    }
  </style>
</head>

<body>
  <main class="logo-stage">
    <div class="logo-wrap">
      <img
        src="https://www.loganslaboratory.com/3D2.png"
        alt="Logan's Laboratory Logo"
        class="logo"
      />
    </div>
  </main>

  <footer>
    <p class="footer-text">
      Logan's Laboratory © <span id="year"></span>. All rights reserved.
    </p>
  </footer>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
